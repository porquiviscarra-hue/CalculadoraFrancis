<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calcular Edad</title>

    <!-- CONEXIÓN CSS -->
    <link rel="stylesheet" href="edad.css">
</head>

<body>

    <div class="contenedor">

        </button>

        <div id="edadResultado"></div>

    </div>

    <!-- CONEXIÓN JAVASCRIPT -->
    <script src="edad.js"></script>

</body>
